<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shooting Game</title>
    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.180.0/build/three.module.js",
          "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.180.0/examples/jsm/",
          "@dimforge/rapier3d-compat": "https://cdn.jsdelivr.net/npm/@dimforge/rapier3d-compat@0.17.3/rapier.es.js"
        }
      }
    </script>
    <script type="module" src="./src/main.js"></script>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        overflow: hidden;
        color: #eef3ff;
        background: #111722;
        font-family: system-ui, sans-serif;
      }

      #game-canvas {
        position: fixed;
        inset: 0;
      }

      #target-ring-ui {
        position: fixed;
        top: calc(50% + 10vh);
        left: calc(50% + 22vw);
        z-index: 2;
        width: min(28vmin, 220px);
        transform: translate(-50%, -50%);
        pointer-events: none;
        user-select: none;
      }

      #target-ring-image {
        display: block;
        width: 100%;
        height: auto;
      }

      #target-ring-trace-area {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        pointer-events: auto;
        touch-action: none;
        cursor: crosshair;
      }

      #shoot-button {
        position: fixed;
        top: calc(50% + 8vh);
        left: calc(50% - 8vw);
        z-index: 3;
        width: min(18vmin, 140px);
        padding: 0;
        border: 0;
        background: transparent;
        transform: translate(-50%, -50%);
        cursor: pointer;
        user-select: none;
      }

      #shoot-button:focus-visible {
        outline: 3px solid #9bd1ff;
        outline-offset: 0.35rem;
      }

      #shoot-button-image {
        display: block;
        width: 100%;
        height: auto;
        pointer-events: none;
      }

      main,
      footer {
        position: relative;
        z-index: 1;
        width: fit-content;
        margin: 1rem;
        padding: 0.75rem 1rem;
        border-radius: 0.75rem;
        background: rgb(9 13 22 / 72%);
        backdrop-filter: blur(6px);
      }

      h1 {
        margin-block: 0 0.5rem;
      }

      p {
        margin: 0;
      }

      footer {
        position: fixed;
        bottom: 0;
      }

      a {
        color: #9bd1ff;
      }
    </style>
  </head>
  <body>
    <div id="game-canvas" aria-label="3D game view"></div>
    <div id="target-ring-ui" aria-label="リングのなぞれる場所">
      <img id="target-ring-image" src="./image/ring.png" alt="Target ring" draggable="false" />
      <div id="target-ring-trace-area" aria-label="リングの当たり判定"></div>
    </div>
    <button id="shoot-button" type="button" aria-label="撃つ">
      <img id="shoot-button-image" src="./image/shoot.png" alt="" draggable="false" />
    </button>
    <main>
      <h1>Shooting Game</h1>
      <p id="status">three.js と Rapier Physics を読み込み中...</p>
    </main>
    <footer>
      <small>
        Libraries: three.js (MIT License), Rapier Physics (Apache License 2.0).
        詳細は <a href="./THIRD_PARTY_NOTICES.md">Third-Party Notices</a> を参照してください。
      </small>
    </footer>
  </body>
</html>
